<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jarvis AI - Admin Dashboard</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background-color: #0f172a; color: white; scroll-behavior: smooth; }
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .gradient-text { background: linear-gradient(45deg, #60a5fa, #a855f7); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #0f172a; }
        ::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #334155; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        function Dashboard() {
            const [stats, setStats] = useState({ totalUsers: 0, totalStocks: 0, status: 'loading' });
            const [summary, setSummary] = useState({ totalValue: 0, totalProfit: 0, profitPercent: 0, sectorAllocation: {} });
            const [trending, setTrending] = useState([]);
            const [recent, setRecent] = useState([]);
            const [history, setHistory] = useState([]);
            const [sentiment, setSentiment] = useState(null);
            const [briefing, setBriefing] = useState("");
            const [logs, setLogs] = useState([]);
            const [loading, setLoading] = useState(true);

            const chartRef = useRef(null);
            const pieRef = useRef(null);
            let myChart = null;
            let myPie = null;

            const fetchData = async () => {
                try {
                    const [s, sum, t, r, h, sent, b, l] = await Promise.all([
                        fetch('/api/stats').then(res => res.json()),
                        fetch('/api/portfolio-summary').then(res => res.json()),
                        fetch('/api/trending').then(res => res.json()),
                        fetch('/api/recent').then(res => res.json()),
                        fetch('/api/portfolio-history').then(res => res.json()),
                        fetch('/api/sentiment').then(res => res.json()),
                        fetch('/api/briefing-latest').then(res => res.json()),
                        fetch('/api/logs').then(res => res.json())
                    ]);
                    setStats(s);
                    setSummary(sum);
                    setTrending(t);
                    setRecent(r);
                    setHistory(h);
                    setSentiment(sent);
                    setBriefing(b.briefing);
                    setLogs(l);
                    setLoading(false);
                } catch (e) {
                    console.error("Fetch error:", e);
                }
            };

            useEffect(() => {
                fetchData();
                const interval = setInterval(fetchData, 30000);
                return () => clearInterval(interval);
            }, []);

            useEffect(() => {
                if (history.length > 0 && chartRef.current) {
                    const ctx = chartRef.current.getContext('2d');
                    if (window.myChart) window.myChart.destroy();
                    window.myChart = new Chart(ctx, {
                        type: 'line',
                        data: {
                            labels: history.map(h => new Date(h.date).toLocaleDateString()),
                            datasets: [{
                                label: 'Portfolio Value ($)',
                                data: history.map(h => h.totalValue),
                                borderColor: '#60a5fa',
                                backgroundColor: 'rgba(96, 165, 250, 0.1)',
                                fill: true,
                                tension: 0.4
                            }]
                        },
                        options: {
                            responsive: true,
                            plugins: { legend: { display: false } },
                            scales: {
                                y: { grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: '#94a3b8' } },
                                x: { grid: { display: false }, ticks: { color: '#94a3b8' } }
                            }
                        }
                    });
                }

                if (summary.sectorAllocation && pieRef.current) {
                    const ctx = pieRef.current.getContext('2d');
                    if (window.myPie) window.myPie.destroy();
                    const sectors = Object.keys(summary.sectorAllocation);
                    const values = Object.values(summary.sectorAllocation);
                    window.myPie = new Chart(ctx, {
                        type: 'doughnut',
                        data: {
                            labels: sectors,
                            datasets: [{
                                data: values,
                                backgroundColor: ['#60a5fa', '#a855f7', '#f59e0b', '#10b981', '#ef4444', '#6366f1'],
                                borderWidth: 0
                            }]
                        },
                        options: {
                            responsive: true,
                            plugins: { legend: { position: 'bottom', labels: { color: '#94a3b8', padding: 20 } } },
                            cutout: '70%'
                        }
                    });
                }
            }, [history, summary]);

            const triggerAction = async (action) => {
                const endpoint = action === 'briefing' ? '/api/trigger-briefing' : '/api/trigger-snapshot';
                await fetch(endpoint, { method: 'POST' });
                alert(`${action.toUpperCase()} started! Check logs in a few seconds.`);
                fetchData();
            };

            return (
                <div className="p-4 md:p-8 max-w-7xl mx-auto mb-20">
                    <header className="flex flex-col md:flex-row justify-between items-start md:items-center gap-4 mb-12">
                        <div>
                            <h1 className="text-4xl font-black gradient-text">JARVIS COMMAND CENTER</h1>
                            <p className="text-gray-400 font-medium">Stable Version 1.2 - Intelligent Portfolio Manager</p>
                        </div>
                        <div className="flex items-center gap-4">
                            <div className="flex flex-col items-end">
                                <div className="flex items-center gap-2">
                                    <span className={`w-3 h-3 rounded-full ${stats.status === 'online' ? 'bg-green-500 shadow-[0_0_10px_#22c55e]' : 'bg-yellow-500 animate-pulse'}`}></span>
                                    <span className="font-bold tracking-widest text-sm">{stats.status.toUpperCase()}</span>
                                </div>
                                <span className="text-xs text-gray-500">Last updated: {new Date().toLocaleTimeString()}</span>
                            </div>
                            <button onClick={() => fetchData()} className="glass p-3 rounded-xl hover:bg-white/10 transition">
                                <i className="fas fa-sync-alt"></i>
                            </button>
                        </div>
                    </header>

                    {/* Stats Row */}
                    <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6 mb-8">
                        <div className="glass p-6 rounded-3xl border-l-4 border-blue-500">
                            <div className="flex justify-between items-start mb-4">
                                <i className="fas fa-wallet text-blue-400 text-xl"></i>
                                <span className="text-xs font-bold text-gray-500 uppercase tracking-tighter">Net Worth</span>
                            </div>
                            <div className="text-3xl font-black">${summary.totalValue.toLocaleString(undefined, {minimumFractionDigits: 2})}</div>
                            <div className={`text-sm font-bold mt-1 ${summary.totalProfit >= 0 ? 'text-green-400' : 'text-red-400'}`}>
                                {summary.totalProfit >= 0 ? '+' : ''}${summary.totalProfit.toLocaleString()} ({summary.profitPercent.toFixed(2)}%)
                            </div>
                        </div>
                        <div className="glass p-6 rounded-3xl border-l-4 border-purple-500">
                            <div className="flex justify-between items-start mb-4">
                                <i className="fas fa-users text-purple-400 text-xl"></i>
                                <span className="text-xs font-bold text-gray-500 uppercase tracking-tighter">Investors</span>
                            </div>
                            <div className="text-3xl font-black">{stats.totalUsers}</div>
                            <div className="text-sm text-gray-400 mt-1">Active users in network</div>
                        </div>
                        <div className="glass p-6 rounded-3xl border-l-4 border-orange-500">
                            <div className="flex justify-between items-start mb-4">
                                <i className="fas fa-microchip text-orange-400 text-xl"></i>
                                <span className="text-xs font-bold text-gray-500 uppercase tracking-tighter">Sentiment</span>
                            </div>
                            <div className="text-3xl font-black">{sentiment?.sentiment?.stock?.score || '50'}</div>
                            <div className="text-sm text-gray-400 mt-1">{sentiment?.sentiment?.stock?.rating || 'Neutral'}</div>
                        </div>
                        <div className="glass p-6 rounded-3xl border-l-4 border-emerald-500">
                            <div className="flex justify-between items-start mb-4">
                                <i className="fas fa-terminal text-emerald-400 text-xl"></i>
                                <span className="text-xs font-bold text-gray-500 uppercase tracking-tighter">Actions</span>
                            </div>
                            <div className="flex gap-2">
                                <button onClick={() => triggerAction('briefing')} className="bg-emerald-500/20 text-emerald-400 px-3 py-1 rounded-lg text-xs font-bold hover:bg-emerald-500/30 transition">BRIEFING</button>
                                <button onClick={() => triggerAction('snapshot')} className="bg-blue-500/20 text-blue-400 px-3 py-1 rounded-lg text-xs font-bold hover:bg-blue-500/30 transition">SNAPSHOT</button>
                            </div>
                        </div>
                    </div>

                    <div className="grid grid-cols-1 lg:grid-cols-3 gap-8">
                        {/* Main Chart */}
                        <div className="lg:col-span-2 glass p-8 rounded-3xl">
                            <div className="flex justify-between items-center mb-8">
                                <h2 className="text-xl font-bold">Portfolio Performance</h2>
                                <div className="flex gap-2">
                                    <span className="bg-blue-500/20 text-blue-400 px-2 py-1 rounded text-[10px] font-bold">LIVE HISTORY</span>
                                </div>
                            </div>
                            <canvas ref={chartRef} height="120"></canvas>
                        </div>

                        {/* Jarvis Briefing */}
                        <div className="glass p-8 rounded-3xl bg-blue-500/5 border border-blue-500/20">
                            <div className="flex items-center gap-3 mb-6">
                                <div className="w-10 h-10 rounded-full bg-blue-500 flex items-center justify-center">
                                    <i className="fas fa-robot text-white"></i>
                                </div>
                                <div>
                                    <h2 className="font-bold text-lg">Jarvis Daily Insight</h2>
                                    <p className="text-[10px] text-blue-400 uppercase font-black tracking-widest">Autonomous Summary</p>
                                </div>
                            </div>
                            <div className="text-sm text-blue-100 leading-relaxed italic bg-black/20 p-4 rounded-2xl border border-white/5 whitespace-pre-wrap">
                                "{briefing || 'วิเคราะห์ข้อมูลเสร็จสิ้น กำลังรอรอบสรุปใหม่ครับเจ้านาย...'}"
                            </div>
                        </div>

                        {/* Recent Activity */}
                        <div className="glass p-8 rounded-3xl">
                            <h2 className="text-xl font-bold mb-6">Trade Activity</h2>
                            <div className="space-y-4 max-h-[400px] overflow-y-auto pr-2">
                                {recent.map((tx, i) => (
                                    <div key={i} className="flex justify-between items-center p-4 hover:bg-white/5 rounded-2xl transition border border-transparent hover:border-white/10">
                                        <div className="flex gap-4 items-center">
                                            <span className={`w-10 h-10 flex items-center justify-center rounded-xl ${tx.type === 'BUY' ? 'bg-green-500/20 text-green-500' : 'bg-blue-500/20 text-blue-500'}`}>
                                                {tx.type === 'BUY' ? <i className="fas fa-plus"></i> : <i className="fas fa-coins"></i>}
                                            </span>
                                            <div>
                                                <div className="font-bold">{tx.symbol}</div>
                                                <div className="text-[10px] text-gray-500 font-mono uppercase">{new Date(tx.date).toLocaleDateString()} {new Date(tx.date).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}</div>
                                            </div>
                                        </div>
                                        <div className="text-right">
                                            <div className="font-black text-sm">${tx.price.toFixed(2)}</div>
                                            {tx.changePercent !== undefined && (
                                                <div className={`text-[10px] font-bold ${tx.changePercent >= 0 ? 'text-green-400' : 'text-red-400'}`}>
                                                    {tx.changePercent >= 0 ? '▲' : '▼'} {Math.abs(tx.changePercent).toFixed(2)}%
                                                </div>
                                            )}
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>

                        {/* Sector Allocation */}
                        <div className="glass p-8 rounded-3xl flex flex-col items-center">
                            <h2 className="text-xl font-bold mb-8 w-full">Sector Distribution</h2>
                            <div className="w-full max-w-[240px]">
                                <canvas ref={pieRef}></canvas>
                            </div>
                        </div>

                        {/* Bot Logs */}
                        <div className="glass p-8 rounded-3xl">
                            <div className="flex justify-between items-center mb-6">
                                <h2 className="text-xl font-bold">System Logs</h2>
                                <i className="fas fa-cog animate-spin-slow text-gray-600"></i>
                            </div>
                            <div className="space-y-2 font-mono text-[11px] max-h-[300px] overflow-y-auto pr-2">
                                {logs.map((l, i) => (
                                    <div key={i} className="flex gap-3 border-b border-white/5 pb-2">
                                        <span className="text-gray-600">[{new Date(l.timestamp).toLocaleTimeString()}]</span>
                                        <span className={l.type === 'admin' ? 'text-purple-400' : l.type === 'system' ? 'text-emerald-400' : 'text-gray-400'}>
                                            {l.message}
                                        </span>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<Dashboard />);
    </script>
</body>
</html>
