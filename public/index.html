<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jarvis AI - Command Center</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background-color: #0f172a; color: white; scroll-behavior: smooth; font-family: 'Inter', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .glass-dark { background: rgba(0, 0, 0, 0.4); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .gradient-text { background: linear-gradient(45deg, #60a5fa, #a855f7); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .ai-glow { box-shadow: 0 0 30px rgba(96, 165, 250, 0.15); }
        
        /* Markdown Styling */
        .prose-custom { line-height: 1.6; }
        .prose-custom p { margin-bottom: 0.75rem; }
        .prose-custom ul { margin-bottom: 0.75rem; list-style-type: disc; padding-left: 1.25rem; }
        .prose-custom li { margin-bottom: 0.25rem; }
        .prose-custom strong { color: #60a5fa; font-weight: 800; }
        
        @keyframes slideUp { from { transform: translateY(10px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .chat-msg { animation: slideUp 0.3s ease-out forwards; }
        
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #0f172a; }
        ::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #334155; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        function ChatWidget() {
            const [isOpen, setIsOpen] = useState(false);
            const [messages, setMessages] = useState([
                { role: 'assistant', content: 'สวัสดีครับเจ้านาย ผม Jarvis พร้อมรับคำสั่งแล้วครับ มีอะไรให้ช่วยไหมครับ?' }
            ]);
            const [input, setInput] = useState('');
            const [isTyping, setIsTyping] = useState(false);
            const scrollRef = useRef(null);

            useEffect(() => {
                if (scrollRef.current) scrollRef.current.scrollTop = scrollRef.current.scrollHeight;
            }, [messages]);

            const sendMessage = async (e) => {
                e.preventDefault();
                if (!input.trim()) return;

                const userMsg = input;
                setInput('');
                setMessages(prev => [...prev, { role: 'user', content: userMsg }]);
                setIsTyping(true);

                try {
                    const res = await fetch('/api/chat', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ message: userMsg })
                    });
                    const data = await res.json();
                    setMessages(prev => [...prev, { role: 'assistant', content: data.response }]);
                } catch (err) {
                    setMessages(prev => [...prev, { role: 'assistant', content: 'ขออภัยครับเจ้านาย ระบบขัดข้องชั่วคราว' }]);
                } finally {
                    setIsTyping(false);
                }
            };

            return (
                <div className="fixed bottom-6 right-6 z-50 flex flex-col items-end">
                    {isOpen && (
                        <div className="glass-dark w-[350px] h-[500px] rounded-3xl mb-4 flex flex-col overflow-hidden shadow-2xl border border-blue-500/20 ai-glow">
                            <div className="p-4 bg-blue-600/20 border-b border-white/10 flex justify-between items-center">
                                <div className="flex items-center gap-2">
                                    <div className="w-2 h-2 bg-green-500 rounded-full animate-pulse"></div>
                                    <span className="font-bold text-sm tracking-widest">JARVIS v1.6</span>
                                </div>
                                <button onClick={() => setIsOpen(false)} className="text-gray-400 hover:text-white">
                                    <i className="fas fa-times"></i>
                                </button>
                            </div>
                            
                            <div ref={scrollRef} className="flex-1 overflow-y-auto p-4 space-y-6 bg-slate-900/50">
                                {messages.map((msg, i) => (
                                    <div key={i} className={`flex ${msg.role === 'user' ? 'justify-end' : 'justify-start'}`}>
                                        <div className={`max-w-[90%] p-4 rounded-3xl chat-msg ${
                                            msg.role === 'user' 
                                            ? 'bg-blue-600 text-white shadow-lg' 
                                            : 'glass-dark text-gray-200 border-white/5'
                                        }`}>
                                            <div 
                                                className={`text-sm prose-custom ${msg.role === 'user' ? 'text-white' : 'text-gray-200'}`}
                                                dangerouslySetInnerHTML={{ __html: marked.parse(msg.content) }}
                                            />
                                        </div>
                                    </div>
                                ))}
                                {isTyping && (
                                    <div className="flex justify-start">
                                        <div className="glass p-3 px-6 rounded-full text-xs text-blue-400 font-bold animate-pulse">
                                            <i className="fas fa-microchip mr-2"></i>
                                            Jarvis กำลังวิเคราะห์...
                                        </div>
                                    </div>
                                )}
                            </div>

                            <form onSubmit={sendMessage} className="p-4 bg-black/40 border-t border-white/10 flex gap-2">
                                <input 
                                    value={input}
                                    onChange={(e) => setInput(e.target.value)}
                                    placeholder="ส่งคำสั่งถึง Jarvis..."
                                    className="flex-1 bg-white/5 border border-white/10 rounded-xl px-4 py-2 text-sm focus:outline-none focus:border-blue-500 transition"
                                />
                                <button type="submit" className="bg-blue-600 hover:bg-blue-500 p-2 rounded-xl transition">
                                    <i className="fas fa-paper-plane"></i>
                                </button>
                            </form>
                        </div>
                    )}
                    <button 
                        onClick={() => setIsOpen(!isOpen)}
                        className="w-16 h-16 rounded-full bg-blue-600 flex items-center justify-center shadow-lg hover:scale-110 active:scale-95 transition-all ai-glow"
                    >
                        {isOpen ? <i className="fas fa-comment-slash text-xl"></i> : <i className="fas fa-robot text-2xl"></i>}
                    </button>
                </div>
            );
        }

        function Dashboard() {
            const [stats, setStats] = useState({ totalUsers: 0, totalStocks: 0, status: 'loading' });
            const [summary, setSummary] = useState({ totalValue: 0, totalProfit: 0, profitPercent: 0, sectorAllocation: {} });
            const [history, setHistory] = useState([]);
            const [usage, setUsage] = useState([]);
            const [logs, setLogs] = useState([]);
            const [loading, setLoading] = useState(true);

            const chartRef = useRef(null);
            const usageRef = useRef(null);

            const fetchData = async () => {
                try {
                    const [s, sum, h, u, l] = await Promise.all([
                        fetch('/api/stats').then(res => res.json()),
                        fetch('/api/portfolio-summary').then(res => res.json()),
                        fetch('/api/portfolio-history').then(res => res.json()),
                        fetch('/api/ai-usage').then(res => res.json()),
                        fetch('/api/logs').then(res => res.json())
                    ]);
                    setStats(s);
                    setSummary(sum);
                    setHistory(h);
                    setUsage(u.reverse());
                    setLogs(l);
                    setLoading(false);
                } catch (e) { console.error(e); }
            };

            useEffect(() => {
                fetchData();
                const interval = setInterval(fetchData, 30000);
                return () => clearInterval(interval);
            }, []);

            useEffect(() => {
                if (history.length > 0 && chartRef.current) {
                    const ctx = chartRef.current.getContext('2d');
                    if (window.myChart) window.myChart.destroy();
                    window.myChart = new Chart(ctx, {
                        type: 'line',
                        data: {
                            labels: history.map(h => new Date(h.date).toLocaleDateString()),
                            datasets: [{
                                label: 'Value ($)',
                                data: history.map(h => h.totalValue),
                                borderColor: '#60a5fa',
                                borderWidth: 3,
                                pointRadius: 0,
                                fill: true,
                                backgroundColor: ctx.createLinearGradient(0, 0, 0, 400)
                            }]
                        },
                        options: {
                            responsive: true,
                            plugins: { legend: { display: false } },
                            scales: {
                                y: { grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: '#64748b' } },
                                x: { grid: { display: false }, ticks: { color: '#64748b' } }
                            }
                        }
                    });
                    const grad = ctx.createLinearGradient(0, 0, 0, 300);
                    grad.addColorStop(0, 'rgba(96, 165, 250, 0.2)');
                    grad.addColorStop(1, 'rgba(96, 165, 250, 0)');
                    window.myChart.data.datasets[0].backgroundColor = grad;
                    window.myChart.update();
                }

                if (usage.length > 0 && usageRef.current) {
                    const ctx = usageRef.current.getContext('2d');
                    if (window.myUsage) window.myUsage.destroy();
                    window.myUsage = new Chart(ctx, {
                        type: 'bar',
                        data: {
                            labels: usage.map(u => u.date.split('-').slice(1).join('/')),
                            datasets: [
                                { label: 'Primary (3.1)', data: usage.map(u => u.primaryCount), backgroundColor: '#60a5fa', borderRadius: 5 },
                                { label: 'Backup (2.5)', data: usage.map(u => u.backupCount), backgroundColor: '#a855f7', borderRadius: 5 }
                            ]
                        },
                        options: {
                            responsive: true,
                            scales: {
                                y: { stacked: true, grid: { color: 'rgba(255,255,255,0.05)' } },
                                x: { stacked: true, grid: { display: false } }
                            },
                            plugins: { legend: { labels: { color: '#94a3b8', boxWidth: 10 } } }
                        }
                    });
                }
            }, [history, usage]);

            return (
                <div className="min-h-screen p-4 md:p-8 max-w-7xl mx-auto">
                    <header className="flex flex-col md:flex-row justify-between items-start md:items-center gap-6 mb-12">
                        <div>
                            <div className="flex items-center gap-3 mb-2">
                                <span className="bg-blue-600 text-white text-[10px] font-black px-2 py-0.5 rounded tracking-tighter">V1.6 STABLE</span>
                                <h1 className="text-3xl font-black gradient-text tracking-tighter uppercase">Jarvis Command</h1>
                            </div>
                            <p className="text-gray-500 text-sm font-medium">Autonomous Portfolio Strategic Unit</p>
                        </div>
                        <div className="glass px-6 py-3 rounded-2xl flex items-center gap-6">
                            <div className="text-right border-r border-white/10 pr-6">
                                <div className="text-[10px] font-bold text-gray-500 uppercase">System Status</div>
                                <div className="flex items-center gap-2">
                                    <div className="w-2 h-2 bg-green-500 rounded-full shadow-[0_0_10px_#22c55e]"></div>
                                    <span className="text-xs font-black tracking-widest text-green-400">OPERATIONAL</span>
                                </div>
                            </div>
                            <button onClick={() => fetchData()} className="text-gray-400 hover:text-white transition">
                                <i className="fas fa-sync-alt"></i>
                            </button>
                        </div>
                    </header>

                    {/* Stats */}
                    <div className="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
                        <div className="glass p-6 rounded-3xl relative overflow-hidden group">
                            <div className="absolute top-0 right-0 w-24 h-24 bg-blue-500/10 rounded-full -mr-12 -mt-12 group-hover:scale-150 transition-transform duration-500"></div>
                            <div className="text-gray-500 text-xs font-bold uppercase mb-2">Portfolio Value</div>
                            <div className="text-4xl font-black mb-1">${summary.totalValue.toLocaleString()}</div>
                            <div className={`text-sm font-bold ${summary.totalProfit >= 0 ? 'text-green-400' : 'text-red-400'}`}>
                                {summary.totalProfit >= 0 ? '▲' : '▼'} {summary.profitPercent.toFixed(2)}%
                            </div>
                        </div>
                        <div className="glass p-6 rounded-3xl relative overflow-hidden group">
                            <div className="absolute top-0 right-0 w-24 h-24 bg-purple-500/10 rounded-full -mr-12 -mt-12 group-hover:scale-150 transition-transform duration-500"></div>
                            <div className="text-gray-500 text-xs font-bold uppercase mb-2">Active Investors</div>
                            <div className="text-4xl font-black mb-1">{stats.totalUsers}</div>
                            <div className="text-sm text-gray-400 font-medium">Verified nodes in network</div>
                        </div>
                        <div className="glass p-6 rounded-3xl relative overflow-hidden group">
                            <div className="absolute top-0 right-0 w-24 h-24 bg-emerald-500/10 rounded-full -mr-12 -mt-12 group-hover:scale-150 transition-transform duration-500"></div>
                            <div className="text-gray-500 text-xs font-bold uppercase mb-2">Assets Tracked</div>
                            <div className="text-4xl font-black mb-1">{stats.totalStocks}</div>
                            <div className="text-sm text-gray-400 font-medium">Real-time market surveillance</div>
                        </div>
                    </div>

                    <div className="grid grid-cols-1 lg:grid-cols-3 gap-8 mb-12">
                        <div className="lg:col-span-2 glass p-8 rounded-[40px]">
                            <h2 className="text-xl font-black mb-8 uppercase tracking-tighter italic">Growth Dynamics</h2>
                            <canvas ref={chartRef} height="120"></canvas>
                        </div>
                        <div className="glass p-8 rounded-[40px] flex flex-col justify-between">
                            <div>
                                <h2 className="text-xl font-black mb-8 uppercase tracking-tighter italic">AI Load Balance</h2>
                                <canvas ref={usageRef} height="150"></canvas>
                            </div>
                            <div className="mt-6 p-4 bg-white/5 rounded-2xl border border-white/5 text-[10px] text-gray-500 leading-relaxed uppercase">
                                <i className="fas fa-info-circle mr-2 text-blue-500"></i>
                                Monitoring Gemini 3.1 Primary vs 2.5 Backup failover distribution over time.
                            </div>
                        </div>
                    </div>

                    <div className="grid grid-cols-1 lg:grid-cols-2 gap-8">
                        <div className="glass p-8 rounded-[40px]">
                            <h2 className="text-xl font-black mb-8 uppercase tracking-tighter italic">Operational Logs</h2>
                            <div className="space-y-3 font-mono text-[10px] max-h-[300px] overflow-y-auto pr-4">
                                {logs.map((l, i) => (
                                    <div key={i} className="flex gap-4 border-b border-white/5 pb-2 hover:bg-white/5 transition px-2">
                                        <span className="text-gray-600">[{new Date(l.timestamp).toLocaleTimeString()}]</span>
                                        <span className={l.type === 'admin' ? 'text-purple-400' : l.type === 'system' ? 'text-blue-400' : 'text-gray-400'}>
                                            {l.message.toUpperCase()}
                                        </span>
                                    </div>
                                ))}
                            </div>
                        </div>
                        <div className="glass p-8 rounded-[40px] bg-blue-600/5 border-blue-500/20">
                            <h2 className="text-xl font-black mb-6 uppercase tracking-tighter italic text-blue-400">Quick Commands</h2>
                            <div className="grid grid-cols-2 gap-4">
                                <button onClick={() => fetchData()} className="glass p-6 rounded-3xl hover:bg-blue-600/20 transition group text-left">
                                    <i className="fas fa-bolt mb-4 text-blue-500 group-hover:scale-125 transition-transform"></i>
                                    <div className="text-sm font-black">REFRESH ALL</div>
                                    <div className="text-[10px] text-gray-500">SYNC STATE</div>
                                </button>
                                <button onClick={() => alert('Feature incoming')} className="glass p-6 rounded-3xl hover:bg-purple-600/20 transition group text-left">
                                    <i className="fas fa-shield-alt mb-4 text-purple-500 group-hover:scale-125 transition-transform"></i>
                                    <div className="text-sm font-black">SECURITY SCAN</div>
                                    <div className="text-[10px] text-gray-500">AUDIT CORE</div>
                                </button>
                                <button onClick={() => alert('Feature incoming')} className="glass p-6 rounded-3xl hover:bg-emerald-600/20 transition group text-left">
                                    <i className="fas fa-database mb-4 text-emerald-500 group-hover:scale-125 transition-transform"></i>
                                    <div className="text-sm font-black">CLEAN CACHE</div>
                                    <div className="text-[10px] text-gray-500">OPTIMIZE STORAGE</div>
                                </button>
                                <button onClick={() => alert('Feature incoming')} className="glass p-6 rounded-3xl hover:bg-orange-600/20 transition group text-left">
                                    <i className="fas fa-paper-plane mb-4 text-orange-500 group-hover:scale-125 transition-transform"></i>
                                    <div className="text-sm font-black">PUSH UPDATE</div>
                                    <div className="text-[10px] text-gray-500">FORCE DEPLOY</div>
                                </button>
                            </div>
                        </div>
                    </div>

                    <ChatWidget />
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<Dashboard />);
    </script>
</body>
</html>
