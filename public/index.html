<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jarvis AI - Admin Dashboard</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background-color: #0f172a; color: white; }
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        function Dashboard() {
            const [stats, setStats] = useState({ totalUsers: 0, totalStocks: 0, status: 'loading' });
            const [trending, setTrending] = useState([]);
            const [recent, setRecent] = useState([]);

            const fetchData = async () => {
                try {
                    const [s, t, r] = await Promise.all([
                        fetch('/api/stats').then(res => res.json()),
                        fetch('/api/trending').then(res => res.json()),
                        fetch('/api/recent').then(res => res.json())
                    ]);
                    setStats(s);
                    setTrending(t);
                    setRecent(r);
                } catch (e) {
                    console.error("Fetch error:", e);
                }
            };

            useEffect(() => {
                fetchData();
                const interval = setInterval(fetchData, 30000); // Update every 30s
                return () => clearInterval(interval);
            }, []);

            return (
                <div className="p-8 max-w-6xl mx-auto">
                    <header className="flex justify-between items-center mb-12">
                        <div>
                            <h1 className="text-4xl font-bold text-blue-400">Jarvis AI Alpha</h1>
                            <p className="text-gray-400">Investment Bot Command Center</p>
                        </div>
                        <div className="flex items-center gap-2">
                            <span className={`w-3 h-3 rounded-full ${stats.status === 'online' ? 'bg-green-500' : 'bg-yellow-500 animate-pulse'}`}></span>
                            <span className="font-mono">{stats.status.toUpperCase()}</span>
                        </div>
                    </header>

                    {/* Stats Grid */}
                    <div className="grid grid-cols-1 md:grid-cols-3 gap-6 mb-12">
                        <div className="glass p-6 rounded-2xl">
                            <i className="fas fa-users text-blue-400 mb-4 text-2xl"></i>
                            <div className="text-3xl font-bold">{stats.totalUsers}</div>
                            <div className="text-gray-400">Active Investors</div>
                        </div>
                        <div className="glass p-6 rounded-2xl">
                            <i className="fas fa-chart-line text-purple-400 mb-4 text-2xl"></i>
                            <div className="text-3xl font-bold">{stats.totalStocks}</div>
                            <div className="text-gray-400">Stocks Tracked</div>
                        </div>
                        <div className="glass p-6 rounded-2xl">
                            <i className="fas fa-fire text-orange-400 mb-4 text-2xl"></i>
                            <div className="text-3xl font-bold">{trending[0]?._id || 'N/A'}</div>
                            <div className="text-gray-400">Top Trending</div>
                        </div>
                    </div>

                    <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
                        {/* Recent Activity */}
                        <div className="glass p-6 rounded-2xl">
                            <h2 className="text-xl font-bold mb-6">Recent Activity</h2>
                            <div className="space-y-4">
                                {recent.map((tx, i) => (
                                    <div key={i} className="flex justify-between items-center p-3 hover:bg-white/5 rounded-lg transition">
                                        <div className="flex gap-4 items-center">
                                            <span className={`w-10 h-10 flex items-center justify-center rounded-full ${tx.type === 'BUY' ? 'bg-green-500/20 text-green-500' : 'bg-blue-500/20 text-blue-500'}`}>
                                                {tx.type === 'BUY' ? <i className="fas fa-shopping-cart"></i> : <i className="fas fa-coins"></i>}
                                            </span>
                                            <div>
                                                <div className="font-bold">{tx.symbol}</div>
                                                <div className="text-xs text-gray-500">{new Date(tx.date).toLocaleString()}</div>
                                            </div>
                                        </div>
                                        <div className="text-right">
                                            <div className={tx.type === 'BUY' ? 'text-green-400' : 'text-blue-400'}>{tx.type}</div>
                                            <div className="text-xs text-gray-400">${tx.price.toFixed(2)}</div>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>

                        {/* Trending List */}
                        <div className="glass p-6 rounded-2xl">
                            <h2 className="text-xl font-bold mb-6">Popular Stocks</h2>
                            <div className="space-y-4">
                                {trending.map((item, i) => (
                                    <div key={i} className="flex items-center justify-between p-3">
                                        <div className="flex items-center gap-4">
                                            <span className="text-2xl font-bold text-gray-700">{i+1}</span>
                                            <span className="font-bold text-xl">{item._id}</span>
                                        </div>
                                        <div className="bg-blue-500/10 text-blue-400 px-3 py-1 rounded-full text-sm">
                                            {item.count} users
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<Dashboard />);
    </script>
</body>
</html>
